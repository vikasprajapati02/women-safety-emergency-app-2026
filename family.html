<!-- family.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tracking</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffe4ec,#f3e8ff,#e0f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}
.box{
    width:420px;
    max-width:100%;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.12);
    text-align:center;
}
h1{
    color:#e11d8a;
    margin-bottom:15px;
}
p{
    color:#555;
    margin-bottom:20px;
}
#location{
    background:#f9fafb;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    word-break:break-all;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(to right,#ec4899,#8b5cf6);
    color:white;
    font-size:17px;
    cursor:pointer;
}
button:hover{
    opacity:0.9;
}
</style>
</head>
<body>

    <h1 id="title">📍 Family Dashboard</h1>
<div class="box">
    <h1>📍 Family Dashboard</h1>
    <p>Track latest emergency location</p>

    <div id="location">No location yet</div>

    <button onclick="getLocation()">Refresh Location</button>
</div>

<script>
let userName = localStorage.getItem("userName");

document.getElementById("title").innerText =
"📍 Tracking: " + userName;

function getLocation() {
    fetch("http://localhost:5000/location")
    .then(response => response.text())
    .then(data => {
        document.getElementById("location").innerHTML =
        `<a href="${data}" target="_blank">Open Live Location on Map</a>`;
    })
    .catch(() => {
        document.getElementById("location").innerText = "Server not connected";
    });
}

getLocation();
setInterval(getLocation, 5000);
</script>

</body>
</html>
